<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訣別</title>
  <style>
    @font-face {
      font-family: 'MaruBuri';
      src: url(https://hangeul.pstatic.net/hangeul_static/webfont/MaruBuri/MaruBuri-Regular.woff2) format("woff2"),
           url(https://hangeul.pstatic.net/hangeul_static/webfont/MaruBuri/MaruBuri-Regular.woff) format("woff"),
           url(https://hangeul.pstatic.net/hangeul_static/webfont/MaruBuri/MaruBuri-Regular.ttf) format("truetype");}
    @font-face {
    font-family: 'SeoulHangangM';
    src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_two@1.0/SeoulHangangM.woff') format('woff');
    font-weight: normal;
    font-style: normal;}
    @font-face {
    font-family: 'ChosunKm';
    src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_20-04@1.0/ChosunKm.woff') format('woff');
    font-weight: normal;
    font-style: normal;}

    html, body, .btn, .container {
      font-family: 'MaruBuri', sans-serif; margin: 0; padding: 0;
       height: 100%;
      margin: 0;
      padding: 0;
      background-image: url('zimg/broken.jpg'); 
      background-size: cover;         /* 화면 가득 채움 */
      background-repeat: no-repeat;   /* 반복 금지 */
      background-position: center;    /* 중앙 정렬 */
      background-attachment: fixed;   /* 스크롤해도 고정됨 */}

    header, footer {
      text-align: center;
      color: white;}

    h1{margin: 0}

    .wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;}

    .container {
      display: grid;
      grid-template-columns: repeat(6, 150px);
      grid-template-rows: repeat(2, 150px);
      gap: 0;
      padding: 50px 0px;}

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #000;
      font-size: 16px;
      border: 0px solid #999;
      width: 150px;
      height: 150px;}

    .btn img {
      max-width: 100%;
      max-height: 100%;
      object-fit: cover;}

    .main-hanja{font-family: 'ChosunKm', serif; display: inline-block; background-color: black;}

    .shadow{text-shadow: 3px 3px 3px rgba(0, 0, 0, 0.3)}

    /* 버튼 위치 매핑 */
    .b1 { grid-column: 1 / 5; grid-row: 1 / 2; }
    .b2 { grid-column: 1 / 5; grid-row: 2 / 2; }
    .b3 { grid-column: 2 / 5; grid-row: 2 / 2; }
    .b4 { grid-column: 6 / 6; grid-row: 1 / 2; }
    .b5 { grid-column: 3 / 5; grid-row: 1 / 2; }
    .b6 { grid-column: 4 / 5; grid-row: 1 / 2; }
    .b7 { grid-column: 4 / 5; grid-row: 2 / 2; }
    .b8 { grid-column: 5 / 5; grid-row: 2 / 2; }
    .b9 { grid-column: 6 / 6; grid-row: 2 / 2; }

  </style>
</head>
<body>
  <header class="bg-main" style="padding-top: 100px; padding-bottom: 50px;">
    <h1 class="main-hanja" style="padding: 15px 30px; font-size: 9rem;">訣別</h1>
    <p class="shadow" style="padding-top: 50px;">이곳에는 설명이 들어갈 예정입니다.이곳에는 설명이 들어갈 예정입니다.이곳에는 설명이 들어갈 예정입니다.<br>이곳에는 설명이 들어갈 예정입니다.이곳에는 설명이 들어갈 예정입니다.이곳에는 설명이 들어갈 예정입니다.</p>
  </header>
  <section>
     <div class="wrapper">
        <main class="container">
          <a href="#" class="btn b1"><img src="zimg/poem.png" alt="버튼1"></a>
          <a href="#" class="btn b2"><img src="zimg/poem.png" alt="버튼2"></a>
          <a href="#" class="btn b3"><img src="zimg/poem.png" alt="버튼3"></a>
          <a href="#" class="btn b5"><img src="zimg/lyrics.png" alt="버튼5"></a>
          <a href="#" class="btn b6"><img src="zimg/lyrics.png" alt="버튼6"></a>
          <a href="#" class="btn b7"><img src="zimg/lyrics.png" alt="버튼7"></a>
          <a href="#" class="btn b8"><img src="zimg/painting.png" alt="버튼8"></a>
          <a href="#" class="btn b4"><img src="zimg/painting.png" alt="버튼4"></a>
          <a href="#" class="btn b9"><img src="zimg/painting.png" alt="버튼9"></a>
        </main>
    </div>
  </section>
</body>
</html>
